<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Spell Effect Generator</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0f172a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #e2e8f0;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }

        #ui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 340px;
            max-height: calc(100vh - 40px);
            overflow-y: auto;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            box-sizing: border-box;
        }

        #ui-panel::-webkit-scrollbar {
            width: 8px;
        }

        #ui-panel::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 4px;
        }

        h1 {
            font-size: 1.25rem;
            margin: 0 0 10px 0;
            color: #f8fafc;
        }

        .section-title {
            font-size: 0.9rem;
            font-weight: bold;
            color: #ec4899;
            margin: 20px 0 10px 0;
            padding-bottom: 5px;
            border-bottom: 1px solid #334155;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .control-group {
            margin-bottom: 15px;
        }

        label {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            margin-bottom: 5px;
            color: #cbd5e1;
            align-items: center;
        }

        input[type="range"] {
            width: 100%;
            cursor: pointer;
            accent-color: #ec4899;
        }

        input[type="color"] {
            width: 50px;
            height: 30px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            background: none;
        }

        input[type="text"],
        select {
            width: 100%;
            padding: 8px;
            background: #1e293b;
            border: 1px solid #475569;
            border-radius: 6px;
            color: #f8fafc;
            box-sizing: border-box;
            font-family: inherit;
            font-size: 0.9rem;
        }

        input[type="text"]:focus,
        select:focus {
            outline: none;
            border-color: #ec4899;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
            margin-bottom: 10px;
        }

        input[type="checkbox"] {
            accent-color: #ec4899;
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #ec4899;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 5px;
            text-transform: uppercase;
        }

        button:hover {
            background: #db2777;
        }

        button:active {
            background: #be185d;
        }

        .btn-green {
            background: #10b981;
        }
        .btn-green:hover { background: #059669; }

        .btn-purple {
            background: #8b5cf6;
        }
        .btn-purple:hover { background: #7c3aed; }

        .value-display {
            font-family: monospace;
            color: #94a3b8;
            background: #0f172a;
            padding: 2px 6px;
            border-radius: 4px;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>

<body>

    <div id="canvas-container"></div>

    <div id="ui-panel">
        <h1>Spell Effect Generator</h1>

        <div class="section-title">Preset Library</div>
        <div class="control-group">
            <input type="text" id="preset-search" placeholder="Search presets..." style="margin-bottom: 5px;">
            <select id="preset" size="6" style="margin-bottom: 10px; padding: 5px; height: 120px;">
                <!-- populated by JS -->
            </select>
            <div style="display: flex; gap: 8px;">
                <input type="text" id="preset-name" placeholder="Save as..." style="flex: 1;">
                <button id="save-btn" class="btn-green" style="width: auto; margin-top: 0; padding: 8px 12px;">Save</button>
            </div>
            <button id="delete-btn" class="btn-purple" style="background: #ef4444; margin-top: 10px; display: none;">Delete Selected Preset</button>
        </div>

        <div class="section-title">Colors & Blend</div>
        <div class="control-group">
            <label>Primary Color <input type="color" id="color1" value="#ff5500"></label>
        </div>
        <div class="control-group">
            <label>Secondary Color <input type="color" id="color2" value="#ffaa00"></label>
        </div>
        <div class="checkbox-group">
            <input type="checkbox" id="additive" checked>
            <label for="additive" style="margin:0; justify-content: flex-start;">Additive Blending</label>
        </div>

        <div class="section-title">Spawning</div>
        <div class="control-group">
            <label for="shape">Emitter Shape</label>
            <select id="shape">
                <option value="point">Point</option>
                <option value="sphere">Sphere</option>
                <option value="ring">Ring</option>
            </select>
        </div>
        <div class="control-group">
            <label for="emission">Emission Type</label>
            <select id="emission">
                <option value="continuous">Continuous</option>
                <option value="burst">Burst</option>
            </select>
        </div>
        <div class="control-group">
            <label><span>Particle Count</span> <span id="val-count" class="value-display">2000</span></label>
            <input type="range" id="count" min="100" max="20000" step="100" value="2000">
        </div>
        <div class="control-group">
            <label><span>Radius</span> <span id="val-radius" class="value-display">1.0</span></label>
            <input type="range" id="radius" min="0" max="50" step="0.5" value="1.0">
        </div>

        <div class="section-title">Dynamics</div>
        <div class="control-group">
            <label><span>Outward Speed</span> <span id="val-speed" class="value-display">2.0</span></label>
            <input type="range" id="speed" min="-10" max="30" step="0.5" value="2.0">
        </div>
        <div class="control-group">
            <label><span>Upward Draft</span> <span id="val-draft" class="value-display">8.0</span></label>
            <input type="range" id="draft" min="-10" max="30" step="0.5" value="8.0">
        </div>
        <div class="control-group">
            <label><span>Swirl Speed</span> <span id="val-swirl" class="value-display">0.0</span></label>
            <input type="range" id="swirl" min="-15" max="15" step="0.5" value="0.0">
        </div>
        <div class="control-group">
            <label><span>Turbulence</span> <span id="val-turbulence" class="value-display">2.0</span></label>
            <input type="range" id="turbulence" min="0" max="20" step="0.5" value="2.0">
        </div>

        <div class="section-title">Lifecycle</div>
        <div class="control-group">
            <label><span>Life Span (s)</span> <span id="val-life" class="value-display">1.0</span></label>
            <input type="range" id="life" min="0.1" max="10" step="0.1" value="1.0">
        </div>
        <div class="control-group">
            <label><span>Size Start</span> <span id="val-sizeStart" class="value-display">3.0</span></label>
            <input type="range" id="sizeStart" min="0.1" max="15" step="0.1" value="3.0">
        </div>
        <div class="control-group">
            <label><span>Size End</span> <span id="val-sizeEnd" class="value-display">0.5</span></label>
            <input type="range" id="sizeEnd" min="0" max="15" step="0.1" value="0.5">
        </div>
        
        <div class="section-title">Global Settings</div>
        <div class="checkbox-group">
            <input type="checkbox" id="autorotate" checked>
            <label for="autorotate" style="margin:0; justify-content: flex-start;">Auto-Rotate Camera</label>
        </div>
    </div>

    <script>
        // --- 1. Three.js Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x05050a);

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 10, 30);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 2.0;

        // Grid helper
        const gridHelper = new THREE.GridHelper(100, 100, 0x334155, 0x1e293b);
        scene.add(gridHelper);

        // --- 2. Particle System Variables ---
        let particles;
        let particleGeometry;
        let particleMaterial;
        let particleData = [];
        const clock = new THREE.Clock();

        // Create a simple radial gradient texture for soft particles
        function createParticleTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 64;
            canvas.height = 64;
            const ctx = canvas.getContext('2d');
            const gradient = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
            gradient.addColorStop(0, 'rgba(255,255,255,1)');
            gradient.addColorStop(0.3, 'rgba(255,255,255,0.8)');
            gradient.addColorStop(0.6, 'rgba(255,255,255,0.2)');
            gradient.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 64, 64);
            return new THREE.CanvasTexture(canvas);
        }

        const particleTexture = createParticleTexture();

        // --- 3. Presets & UI State ---
        const BUILTIN_PRESETS = {
            default: {
                color1: '#d1ff00', color2: '#006eff', additive: true,
                shape: 'sphere', emission: 'continuous', count: 17700, radius: 12.5,
                speed: -2.5, draft: 0, swirl: -0.5, turbulence: 0,
                life: 5.2, sizeStart: 0.2, sizeEnd: 4.1
            },
            fireball: {
                color1: '#ff5500', color2: '#ffaa00', additive: true,
                shape: 'point', emission: 'continuous', count: 2000, radius: 1,
                speed: 2, draft: 8, swirl: 0, turbulence: 2,
                life: 1.0, sizeStart: 3, sizeEnd: 0.5
            },
            frostnova: {
                color1: '#00ccff', color2: '#ffffff', additive: true,
                shape: 'ring', emission: 'burst', count: 5000, radius: 2,
                speed: 15, draft: 0, swirl: 0, turbulence: 0.5,
                life: 1.5, sizeStart: 2, sizeEnd: 0
            },
            arcaneaura: {
                color1: '#aa00ff', color2: '#ff00aa', additive: true,
                shape: 'ring', emission: 'continuous', count: 3000, radius: 8,
                speed: 0, draft: 2, swirl: 5, turbulence: 1,
                life: 2.5, sizeStart: 2, sizeEnd: 1
            },
            voidrift: {
                color1: '#4a0080', color2: '#000000', additive: false,
                shape: 'sphere', emission: 'continuous', count: 4000, radius: 15,
                speed: -8, draft: 0, swirl: 5, turbulence: 0.5,
                life: 2.0, sizeStart: 1, sizeEnd: 4
            }
        };

        const BUILTIN_NAMES = {
            default: "Default Setup",
            fireball: "Fireball",
            frostnova: "Frost Nova",
            arcaneaura: "Arcane Aura",
            voidrift: "Void Rift"
        };

        let customPresets = JSON.parse(localStorage.getItem('spellGeneratorCustomPresets') || '{}');

        function renderPresetList(filter = '') {
            const select = document.getElementById('preset');
            select.innerHTML = '';
            
            const f = filter.toLowerCase();
            
            const builtinGroup = document.createElement('optgroup');
            builtinGroup.label = "Built-in";
            for (const key in BUILTIN_PRESETS) {
                const name = BUILTIN_NAMES[key];
                if (name.toLowerCase().includes(f)) {
                    const opt = document.createElement('option');
                    opt.value = 'builtin_' + key;
                    opt.textContent = name;
                    builtinGroup.appendChild(opt);
                }
            }
            if (builtinGroup.children.length > 0) select.appendChild(builtinGroup);

            const customGroup = document.createElement('optgroup');
            customGroup.label = "Custom";
            for (const name in customPresets) {
                if (name.toLowerCase().includes(f)) {
                    const opt = document.createElement('option');
                    opt.value = 'custom_' + name;
                    opt.textContent = name;
                    customGroup.appendChild(opt);
                }
            }
            if (customGroup.children.length > 0) select.appendChild(customGroup);
        }

        function updateDisplayValues() {
            document.querySelectorAll('input[type="range"]').forEach(input => {
                const displayObj = document.getElementById(`val-${input.id}`);
                if (displayObj) displayObj.textContent = input.value;
            });
        }

        function getUIValues() {
            return {
                color1: document.getElementById('color1').value,
                color2: document.getElementById('color2').value,
                additive: document.getElementById('additive').checked,
                shape: document.getElementById('shape').value,
                emission: document.getElementById('emission').value,
                count: parseInt(document.getElementById('count').value),
                radius: parseFloat(document.getElementById('radius').value),
                speed: parseFloat(document.getElementById('speed').value),
                draft: parseFloat(document.getElementById('draft').value),
                swirl: parseFloat(document.getElementById('swirl').value),
                turbulence: parseFloat(document.getElementById('turbulence').value),
                life: parseFloat(document.getElementById('life').value),
                sizeStart: parseFloat(document.getElementById('sizeStart').value),
                sizeEnd: parseFloat(document.getElementById('sizeEnd').value)
            };
        }

        // --- 4. Particle Generation Logic ---
        function initSpell() {
            if (particles) scene.remove(particles);

            const v = getUIValues();
            
            particleGeometry = new THREE.BufferGeometry();
            const positions = new Float32Array(v.count * 3);
            const colors = new Float32Array(v.count * 3);
            const sizes = new Float32Array(v.count);
            const opacities = new Float32Array(v.count);

            particleData = [];

            for (let i = 0; i < v.count; i++) {
                positions[i * 3] = 0;
                positions[i * 3 + 1] = 10000; // start hidden
                positions[i * 3 + 2] = 0;

                colors[i * 3] = 1;
                colors[i * 3 + 1] = 1;
                colors[i * 3 + 2] = 1;

                sizes[i] = 1;
                opacities[i] = 1;

                particleData.push({
                    age: 0,
                    maxLife: v.life + (Math.random() - 0.5) * 0.5 * v.life, // 50% variance
                    velocity: new THREE.Vector3(),
                    basePosition: new THREE.Vector3()
                });

                spawnParticle(i, v, positions, true);
            }

            particleGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            particleGeometry.setAttribute('customColor', new THREE.BufferAttribute(colors, 3));
            particleGeometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
            particleGeometry.setAttribute('opacity', new THREE.BufferAttribute(opacities, 1));

            particleMaterial = new THREE.ShaderMaterial({
                uniforms: {
                    pointTexture: { value: particleTexture }
                },
                vertexShader: `
                    attribute float size;
                    attribute vec3 customColor;
                    attribute float opacity;
                    varying vec3 vColor;
                    varying float vOpacity;
                    void main() {
                        vColor = customColor;
                        vOpacity = opacity;
                        vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                        gl_PointSize = size * (300.0 / -mvPosition.z);
                        gl_Position = projectionMatrix * mvPosition;
                    }
                `,
                fragmentShader: `
                    uniform sampler2D pointTexture;
                    varying vec3 vColor;
                    varying float vOpacity;
                    void main() {
                        gl_FragColor = vec4(vColor, vOpacity);
                        gl_FragColor = gl_FragColor * texture2D(pointTexture, gl_PointCoord);
                    }
                `,
                blending: v.additive ? THREE.AdditiveBlending : THREE.NormalBlending,
                depthWrite: false,
                transparent: true
            });

            particles = new THREE.Points(particleGeometry, particleMaterial);
            scene.add(particles);
        }

        function spawnParticle(index, v, positionsArray = null, isInit = false) {
            let p = particleData[index];
            p.age = 0;
            if (isInit && v.emission === 'continuous') {
                p.age = Math.random() * p.maxLife;
            }

            // Shape Spawning
            if (v.shape === 'point') {
                p.basePosition.set(
                    (Math.random() - 0.5) * v.radius,
                    (Math.random() - 0.5) * v.radius,
                    (Math.random() - 0.5) * v.radius
                );
            } else if (v.shape === 'sphere') {
                const u = Math.random();
                const v_phi = Math.random();
                const theta = 2 * Math.PI * u;
                const phi = Math.acos(2 * v_phi - 1);
                p.basePosition.set(
                    v.radius * Math.sin(phi) * Math.cos(theta),
                    v.radius * Math.sin(phi) * Math.sin(theta),
                    v.radius * Math.cos(phi)
                );
            } else if (v.shape === 'ring') {
                const theta = 2 * Math.PI * Math.random();
                const rOff = (Math.random() - 0.5) * (v.radius * 0.2); // 20% thickness
                p.basePosition.set(
                    Math.cos(theta) * v.radius + rOff,
                    (Math.random() - 0.5), // tiny Y variance
                    Math.sin(theta) * v.radius + rOff
                );
            }

            const positions = positionsArray || (particles ? particles.geometry.attributes.position.array : null);
            if (positions) {
                positions[index * 3] = p.basePosition.x;
                positions[index * 3 + 1] = p.basePosition.y;
                positions[index * 3 + 2] = p.basePosition.z;
            }

            // Velocity Assignment
            if (v.shape === 'point') {
                p.velocity.copy(p.basePosition).normalize().multiplyScalar(v.speed);
                if (p.velocity.lengthSq() === 0) {
                    p.velocity.set((Math.random() - 0.5), (Math.random() - 0.5), (Math.random() - 0.5)).normalize().multiplyScalar(v.speed);
                }
            } else {
                p.velocity.copy(p.basePosition).normalize().multiplyScalar(v.speed);
            }

            if (p.age > 0 && positions) {
                const t = p.age;
                let vx = p.velocity.x;
                let vy = p.velocity.y;
                let vz = p.velocity.z;

                let xOff = vx * t;
                let yOff = vy * t + 0.5 * v.draft * t * t;
                let zOff = vz * t;

                vy += v.draft * t;

                if (v.swirl !== 0) {
                    const angle = v.swirl * t;
                    const cosA = Math.cos(angle);
                    const sinA = Math.sin(angle);

                    const nx = xOff * cosA - zOff * sinA;
                    const nz = xOff * sinA + zOff * cosA;
                    xOff = nx;
                    zOff = nz;

                    const nvx = vx * cosA - vz * sinA;
                    const nvz = vx * sinA + vz * cosA;
                    vx = nvx;
                    vz = nvz;
                }

                p.velocity.set(vx, vy, vz);

                positions[index * 3] += xOff;
                positions[index * 3 + 1] += yOff;
                positions[index * 3 + 2] += zOff;
            }
        }

        function animateParticles(delta) {
            if (!particles) return;

            const v = getUIValues();

            if (particleData.length !== v.count) return;

            const positions = particles.geometry.attributes.position.array;
            const colors = particles.geometry.attributes.customColor.array;
            const sizes = particles.geometry.attributes.size.array;
            const opacities = particles.geometry.attributes.opacity.array;

            const c1 = new THREE.Color(v.color1);
            const c2 = new THREE.Color(v.color2);

            const isBurst = v.emission === 'burst';
            let needsRespawn = false;

            for (let i = 0; i < v.count; i++) {
                let p = particleData[i];
                p.age += delta;

                if (p.age >= p.maxLife) {
                    if (isBurst) {
                        opacities[i] = 0;
                        needsRespawn = true;
                        continue;
                    } else {
                        spawnParticle(i, v, positions);
                    }
                }

                const lifeRatio = Math.min(1.0, Math.max(0, p.age / p.maxLife));

                // Apply Physics Forces
                p.velocity.y += v.draft * delta;

                let vx = p.velocity.x;
                let vy = p.velocity.y;
                let vz = p.velocity.z;

                if (v.turbulence > 0) {
                    vx += (Math.random() - 0.5) * v.turbulence * delta * 15;
                    vy += (Math.random() - 0.5) * v.turbulence * delta * 15;
                    vz += (Math.random() - 0.5) * v.turbulence * delta * 15;
                }

                if (v.swirl !== 0) {
                    const currentX = positions[i * 3];
                    const currentZ = positions[i * 3 + 2];
                    const angle = v.swirl * delta;
                    const cosA = Math.cos(angle);
                    const sinA = Math.sin(angle);

                    // rotate position
                    positions[i * 3] = currentX * cosA - currentZ * sinA;
                    positions[i * 3 + 2] = currentX * sinA + currentZ * cosA;

                    // rotate velocity
                    const nvx = vx * cosA - vz * sinA;
                    const nvz = vx * sinA + vz * cosA;
                    vx = nvx;
                    vz = nvz;
                }

                p.velocity.set(vx, vy, vz);

                // Update Position
                positions[i * 3] += vx * delta;
                positions[i * 3 + 1] += vy * delta;
                positions[i * 3 + 2] += vz * delta;

                // Update Visuals
                sizes[i] = v.sizeStart * (1 - lifeRatio) + v.sizeEnd * lifeRatio;

                let tColor = new THREE.Color().copy(c1).lerp(c2, lifeRatio);
                colors[i * 3] = tColor.r;
                colors[i * 3 + 1] = tColor.g;
                colors[i * 3 + 2] = tColor.b;

                // Opacity fade in/out
                if (lifeRatio < 0.1) {
                    opacities[i] = lifeRatio / 0.1;
                } else if (lifeRatio > 0.8) {
                    opacities[i] = (1.0 - lifeRatio) / 0.2;
                } else {
                    opacities[i] = 1.0;
                }
            }

            if (isBurst && needsRespawn) {
                let allDead = true;
                for (let i = 0; i < v.count; i++) {
                    if (particleData[i].age < particleData[i].maxLife) {
                        allDead = false; break;
                    }
                }
                if (allDead) {
                    for (let i = 0; i < v.count; i++) {
                        spawnParticle(i, v, positions);
                    }
                }
            }

            particles.geometry.attributes.position.needsUpdate = true;
            particles.geometry.attributes.customColor.needsUpdate = true;
            particles.geometry.attributes.size.needsUpdate = true;
            particles.geometry.attributes.opacity.needsUpdate = true;
        }

        // --- 5. Event Listeners ---
        document.querySelectorAll('input[type="range"]').forEach(input => {
            input.addEventListener('input', (e) => {
                updateDisplayValues();
                if (input.id === 'count') {
                    // Only re-init count on change to avoid frame drops during slide
                    input.addEventListener('change', initSpell, { once: true });
                }
            });
        });

        // Trigger full re-init for fundamental changes
        ['shape', 'emission', 'additive'].forEach(id => {
            document.getElementById(id).addEventListener('change', initSpell);
        });

        document.getElementById('autorotate').addEventListener('change', (e) => {
            controls.autoRotate = e.target.checked;
        });

        document.getElementById('preset-search').addEventListener('input', (e) => {
            const currentVal = document.getElementById('preset').value;
            renderPresetList(e.target.value);
            if (currentVal) document.getElementById('preset').value = currentVal;
        });

        document.getElementById('preset').addEventListener('change', (e) => {
            const val = e.target.value;
            let p = null;
            if (val.startsWith('builtin_')) {
                p = BUILTIN_PRESETS[val.replace('builtin_', '')];
                document.getElementById('delete-btn').style.display = 'none';
                document.getElementById('preset-name').value = '';
            } else if (val.startsWith('custom_')) {
                const name = val.replace('custom_', '');
                p = customPresets[name];
                document.getElementById('delete-btn').style.display = 'block';
                document.getElementById('preset-name').value = name;
            }
            
            if (!p) return;

            document.getElementById('color1').value = p.color1;
            document.getElementById('color2').value = p.color2;
            document.getElementById('additive').checked = p.additive;
            document.getElementById('shape').value = p.shape;
            document.getElementById('emission').value = p.emission;
            document.getElementById('count').value = p.count;
            document.getElementById('radius').value = p.radius;
            document.getElementById('speed').value = p.speed;
            document.getElementById('draft').value = p.draft;
            document.getElementById('swirl').value = p.swirl;
            document.getElementById('turbulence').value = p.turbulence;
            document.getElementById('life').value = p.life;
            document.getElementById('sizeStart').value = p.sizeStart;
            document.getElementById('sizeEnd').value = p.sizeEnd;

            updateDisplayValues();
            initSpell();
        });

        document.getElementById('save-btn').addEventListener('click', () => {
            const name = document.getElementById('preset-name').value.trim();
            if (!name) {
                alert("Please enter a name for your preset.");
                return;
            }
            customPresets[name] = getUIValues();
            localStorage.setItem('spellGeneratorCustomPresets', JSON.stringify(customPresets));
            renderPresetList(document.getElementById('preset-search').value);
            document.getElementById('preset').value = 'custom_' + name;
            document.getElementById('preset').dispatchEvent(new Event('change'));
            
            const btn = document.getElementById('save-btn');
            const originalText = btn.textContent;
            btn.textContent = 'Saved!';
            setTimeout(() => btn.textContent = originalText, 1500);
        });

        document.getElementById('delete-btn').addEventListener('click', () => {
            const val = document.getElementById('preset').value;
            if (val.startsWith('custom_')) {
                const name = val.replace('custom_', '');
                if (confirm(`Are you sure you want to delete the preset "${name}"?`)) {
                    delete customPresets[name];
                    localStorage.setItem('spellGeneratorCustomPresets', JSON.stringify(customPresets));
                    renderPresetList(document.getElementById('preset-search').value);
                    document.getElementById('delete-btn').style.display = 'none';
                    document.getElementById('preset-name').value = '';
                    
                    // Fall back to default
                    document.getElementById('preset').value = 'builtin_default';
                    document.getElementById('preset').dispatchEvent(new Event('change'));
                }
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- 6. Main Loop ---
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            controls.update();
            animateParticles(delta);
            renderer.render(scene, camera);
        }

        // Boot
        window.onload = () => {
            renderPresetList();
            // Apply default preset
            document.getElementById('preset').value = 'builtin_default';
            document.getElementById('preset').dispatchEvent(new Event('change'));
            animate();
        };

    </script>
</body>

</html>
