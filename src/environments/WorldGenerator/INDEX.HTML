<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D World Generator</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0f172a;
            /* Dark background to pop geometry */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #e2e8f0;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }

        #ui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 340px;
            max-height: calc(100vh - 40px);
            overflow-y: auto;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            box-sizing: border-box;
        }

        #ui-panel::-webkit-scrollbar {
            width: 8px;
        }

        #ui-panel::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 4px;
        }

        h1 {
            font-size: 1.25rem;
            margin: 0 0 10px 0;
            color: #f8fafc;
        }

        .section-title {
            font-size: 0.9rem;
            font-weight: bold;
            color: #38bdf8;
            margin: 20px 0 10px 0;
            padding-bottom: 5px;
            border-bottom: 1px solid #334155;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .control-group {
            margin-bottom: 15px;
        }

        label {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            margin-bottom: 5px;
            color: #cbd5e1;
            align-items: center;
        }

        input[type="range"] {
            width: 100%;
            cursor: pointer;
            accent-color: #3b82f6;
        }

        input[type="text"],
        select {
            width: 100%;
            padding: 8px;
            background: #1e293b;
            border: 1px solid #475569;
            border-radius: 6px;
            color: #f8fafc;
            box-sizing: border-box;
            font-family: inherit;
            font-size: 0.9rem;
        }

        input[type="text"]:focus,
        select:focus {
            outline: none;
            border-color: #3b82f6;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
            margin-bottom: 10px;
        }

        input[type="checkbox"] {
            accent-color: #3b82f6;
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 5px;
            text-transform: uppercase;
        }

        button:hover {
            background: #2563eb;
        }

        button:active {
            background: #1d4ed8;
        }

        .value-display {
            font-family: monospace;
            color: #94a3b8;
            background: #0f172a;
            padding: 2px 6px;
            border-radius: 4px;
        }
    </style>
    <!-- Three.js for 3D rendering -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- OrbitControls for camera interaction -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <!-- SimplexNoise for procedural generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/simplex-noise/2.4.0/simplex-noise.min.js"></script>
</head>

<body>

    <div id="canvas-container"></div>

    <div id="ui-panel">
        <h1>Terrain Generator</h1>

        <div class="section-title">Generation Options</div>
        <div class="control-group">
            <label for="shape">World Shape</label>
            <select id="shape">
                <option value="sphere">Globe (Sphere)</option>
                <option value="plane">Flat (Plane)</option>
                <option value="torus">Ring (Torus)</option>
            </select>
        </div>

        <div class="control-group">
            <label for="seed">World Seed</label>
            <input type="text" id="seed" value="dynamic_world_1">
        </div>

        <div class="control-group">
            <label><span>Base Size</span> <span id="val-size" class="value-display">100</span></label>
            <input type="range" id="size" min="30" max="300" step="10" value="100">
        </div>

        <div class="control-group">
            <label><span>Resolution (Detail)</span> <span id="val-resolution" class="value-display">128</span></label>
            <input type="range" id="resolution" min="32" max="256" step="16" value="128">
        </div>

        <div class="control-group">
            <label><span>Noise Frequency</span> <span id="val-scale" class="value-display">0.02</span></label>
            <input type="range" id="scale" min="0.005" max="0.1" step="0.001" value="0.02">
        </div>

        <div class="control-group">
            <label><span>Max Elevation</span> <span id="val-amplitude" class="value-display">25</span></label>
            <input type="range" id="amplitude" min="5" max="100" step="1" value="25">
        </div>

        <div class="control-group">
            <label><span>Octaves (Roughness)</span> <span id="val-octaves" class="value-display">5</span></label>
            <input type="range" id="octaves" min="1" max="8" step="1" value="5">
        </div>

        <button id="generate-btn">Generate World</button>

        <div class="section-title">Dynamic View Options</div>

        <div class="control-group">
            <label><span>Sea Level</span> <span id="val-water" class="value-display">2</span></label>
            <input type="range" id="water" class="dynamic-slider" min="-20" max="40" step="0.5" value="2">
        </div>

        <div class="control-group">
            <label><span>Water Opacity</span> <span id="val-opacity" class="value-display">0.7</span></label>
            <input type="range" id="opacity" class="dynamic-slider" min="0" max="1" step="0.05" value="0.7">
        </div>

        <div class="checkbox-group">
            <input type="checkbox" id="wireframe" class="dynamic-toggle">
            <label for="wireframe" style="margin:0; justify-content: flex-start;">Wireframe Mode</label>
        </div>

        <div class="checkbox-group">
            <input type="checkbox" id="autorotate" class="dynamic-toggle" checked>
            <label for="autorotate" style="margin:0; justify-content: flex-start;">Auto-Rotate Camera</label>
        </div>

        <div class="checkbox-group">
            <input type="checkbox" id="lowpoly" class="dynamic-toggle">
            <label for="lowpoly" style="margin:0; justify-content: flex-start;">Low Poly Style</label>
        </div>

        <div class="checkbox-group">
            <input type="checkbox" id="animatewaves" class="dynamic-toggle" checked>
            <label for="animatewaves" style="margin:0; justify-content: flex-start;">Animate Waves</label>
        </div>
    </div>

    <script>
        // --- 1. PRNG & Utilities ---
        function getSeededRandom(seedStr) {
            let hash = 0;
            for (let i = 0; i < seedStr.length; i++) {
                hash = Math.imul(31, hash) + seedStr.charCodeAt(i) | 0;
            }
            return function () {
                let t = hash += 0x6D2B79F5;
                t = Math.imul(t ^ t >>> 15, t | 1);
                t ^= t + Math.imul(t ^ t >>> 7, t | 61);
                return ((t ^ t >>> 14) >>> 0) / 4294967296;
            }
        }

        // --- 2. Setup Three.js Scene ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();

        // Dynamic background color based on theme
        scene.background = new THREE.Color(0x0f172a);
        scene.fog = new THREE.FogExp2(0x0f172a, 0.0015);

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.set(0, 150, 300);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 1.0;

        // Lighting setup
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xfffaed, 1.5);
        dirLight.position.set(200, 300, 150);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        const d = 250;
        dirLight.shadow.camera.left = -d;
        dirLight.shadow.camera.right = d;
        dirLight.shadow.camera.top = d;
        dirLight.shadow.camera.bottom = -d;
        dirLight.shadow.camera.far = 1000;
        scene.add(dirLight);

        // Add a soft fill light from opposite side
        const fillLight = new THREE.DirectionalLight(0x88bbff, 0.6);
        fillLight.position.set(-200, 100, -150);
        scene.add(fillLight);

        // --- 3. Global State variables ---
        let terrainMesh, waterMesh;
        let vertexHeights = [];
        let vertexColorModifiers = []; // Cached noise applied to color to save recalculating
        let activeShapeType = 'sphere';
        let baseGeometrySize = 100;
        let globalSimplex; // For animation
        let waterOriginalPositions, waterNormals;

        const COLORS = {
            deepWater: new THREE.Color(0x1e3a8a),
            shallowWater: new THREE.Color(0x3b82f6),
            sand: new THREE.Color(0xd2b48c),
            grass: new THREE.Color(0x4ade80),
            forest: new THREE.Color(0x15803d),
            rock: new THREE.Color(0x64748b),
            snow: new THREE.Color(0xf8fafc)
        };

        // --- 4. Generation Core ---
        function generateWorld() {
            // Clean up previous state
            if (terrainMesh) {
                scene.remove(terrainMesh);
                terrainMesh.geometry.dispose();
                terrainMesh.material.dispose();
            }
            if (waterMesh) {
                scene.remove(waterMesh);
                waterMesh.geometry.dispose();
                waterMesh.material.dispose();
            }
            vertexHeights = [];
            vertexColorModifiers = [];

            // Read Generation Parameters
            activeShapeType = document.getElementById('shape').value;
            const seedStr = document.getElementById('seed').value;
            baseGeometrySize = parseFloat(document.getElementById('size').value);
            const resolution = parseInt(document.getElementById('resolution').value);
            const baseScale = parseFloat(document.getElementById('scale').value);
            const maxAmplitude = parseFloat(document.getElementById('amplitude').value);
            const octaves = parseInt(document.getElementById('octaves').value);

            // Initialize seeded PRNG and Noise
            const prng = getSeededRandom(seedStr);
            globalSimplex = new SimplexNoise(prng);
            const simplex = globalSimplex;

            // Create Base Geometry based on Shape Type
            let geometry, waterGeometry;
            if (activeShapeType === 'sphere') {
                geometry = new THREE.SphereGeometry(baseGeometrySize, resolution, resolution);
                waterGeometry = new THREE.SphereGeometry(baseGeometrySize, resolution, resolution);
            } else if (activeShapeType === 'plane') {
                // Plane is double the size to visually match diameter of a sphere
                geometry = new THREE.PlaneGeometry(baseGeometrySize * 2, baseGeometrySize * 2, resolution, resolution);
                geometry.rotateX(-Math.PI / 2); // Make flat on XZ plane
                waterGeometry = new THREE.PlaneGeometry(baseGeometrySize * 2, baseGeometrySize * 2, resolution, resolution);
                waterGeometry.rotateX(-Math.PI / 2);
            } else if (activeShapeType === 'torus') {
                geometry = new THREE.TorusGeometry(baseGeometrySize, baseGeometrySize / 3, Math.floor(resolution / 2), resolution);
                waterGeometry = new THREE.TorusGeometry(baseGeometrySize, baseGeometrySize / 3, Math.floor(resolution / 2), resolution);
            }

            // Prepare to displace vertices
            const posAttribute = geometry.attributes.position;
            geometry.computeVertexNormals(); // Ensure baseline normals are correct before displacing
            const normAttribute = geometry.attributes.normal;

            const v = new THREE.Vector3();
            const n = new THREE.Vector3();

            // Apply Fractional Brownian Motion (3D mapped)
            for (let i = 0; i < posAttribute.count; i++) {
                v.fromBufferAttribute(posAttribute, i);
                n.fromBufferAttribute(normAttribute, i);

                let height = 0;
                let amplitude = 1;
                let frequency = baseScale;
                let maxValue = 0;

                // 3D Noise ensures seamlessly wrapped geometry mapping
                for (let o = 0; o < octaves; o++) {
                    const noiseVal = simplex.noise3D(v.x * frequency, v.y * frequency, v.z * frequency);
                    height += noiseVal * amplitude;
                    maxValue += amplitude;
                    amplitude *= 0.5;
                    frequency *= 2.0;
                }

                const normalizedHeight = height / maxValue;
                let finalHeight = normalizedHeight * maxAmplitude;

                // Track displacement and noise mod for real-time biome recoloring
                vertexHeights.push(finalHeight);
                vertexColorModifiers.push(simplex.noise3D(v.x * 0.1, v.y * 0.1, v.z * 0.1) * 0.06);

                // Apply displacement outward along the normal
                v.addScaledVector(n, finalHeight);
                posAttribute.setXYZ(i, v.x, v.y, v.z);
            }

            // Recalculate normals to fix lighting shadows and highlights over the new displaced bumpy surface
            geometry.computeVertexNormals();

            // Build Terrain Mesh
            const terrainMaterial = new THREE.MeshStandardMaterial({
                vertexColors: true,
                roughness: 0.85,
                metalness: 0.05,
                flatShading: document.getElementById('lowpoly').checked,
                wireframe: document.getElementById('wireframe').checked
            });

            terrainMesh = new THREE.Mesh(geometry, terrainMaterial);
            terrainMesh.castShadow = true;
            terrainMesh.receiveShadow = true;
            scene.add(terrainMesh);

            // Setup water geometry for vertex animation
            waterGeometry.computeVertexNormals();
            waterOriginalPositions = waterGeometry.attributes.position.clone();
            waterNormals = waterGeometry.attributes.normal.clone();

            // Build Water Mesh
            const waterMaterial = new THREE.MeshPhysicalMaterial({
                color: COLORS.shallowWater,
                transparent: true,
                opacity: parseFloat(document.getElementById('opacity').value),
                roughness: 0.1,
                metalness: 0.1,
                transmission: 0.6, // Glass-like transparency
                ior: 1.33, // Index of refraction for water
                clearcoat: 1.0,
                clearcoatRoughness: 0.1,
                wireframe: document.getElementById('wireframe').checked
            });

            waterMesh = new THREE.Mesh(waterGeometry, waterMaterial);
            waterMesh.receiveShadow = true;
            scene.add(waterMesh);

            // Trigger Real-time states
            updateBiomeColors();
            updateDynamicView();
        }

        // --- 5. Real-Time Dynamic View Updaters ---

        // Recalculates colors instantly against the new water level
        function updateBiomeColors() {
            if (!terrainMesh) return;
            const waterLevel = parseFloat(document.getElementById('water').value);
            const maxAmplitude = parseFloat(document.getElementById('amplitude').value);
            const colors = [];

            for (let i = 0; i < vertexHeights.length; i++) {
                const h = vertexHeights[i];
                let color = new THREE.Color();

                // Dynamic logic: biome lines shift based on water level distance
                if (h < waterLevel - 2) {
                    color.copy(COLORS.deepWater);
                } else if (h <= waterLevel + 1) {
                    color.copy(COLORS.sand);
                } else if (h < waterLevel + maxAmplitude * 0.4) {
                    color.copy(COLORS.grass);
                } else if (h < waterLevel + maxAmplitude * 0.7) {
                    color.copy(COLORS.forest);
                } else if (h < waterLevel + maxAmplitude * 0.95) {
                    color.copy(COLORS.rock);
                } else {
                    color.copy(COLORS.snow);
                }

                // Apply cached variance
                const mod = vertexColorModifiers[i];
                color.r = Math.max(0, Math.min(1, color.r + mod));
                color.g = Math.max(0, Math.min(1, color.g + mod));
                color.b = Math.max(0, Math.min(1, color.b + mod));

                colors.push(color.r, color.g, color.b);
            }

            terrainMesh.geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
            terrainMesh.geometry.attributes.color.needsUpdate = true;
        }

        // Adjusts objects and materials that don't require rebuilding vertices
        function updateDynamicView() {
            if (!waterMesh || !terrainMesh) return;

            const waterLvl = parseFloat(document.getElementById('water').value);
            const opacityLvl = parseFloat(document.getElementById('opacity').value);
            const isWireframe = document.getElementById('wireframe').checked;

            controls.autoRotate = document.getElementById('autorotate').checked;

            // Update Water Object Dimensions/Position based on Shape Type
            if (activeShapeType === 'plane') {
                // Plane just translates vertically
                waterMesh.position.y = waterLvl;
                waterMesh.scale.set(1, 1, 1);
            } else if (activeShapeType === 'sphere') {
                // Sphere scales uniformly outward relative to its base radius
                const scaleFactor = (baseGeometrySize + waterLvl) / baseGeometrySize;
                waterMesh.position.set(0, 0, 0);
                waterMesh.scale.setScalar(scaleFactor);
            } else if (activeShapeType === 'torus') {
                // Uniform scaling looks fine visually for torus flooding
                const scaleFactor = (baseGeometrySize + waterLvl) / baseGeometrySize;
                waterMesh.position.set(0, 0, 0);
                waterMesh.scale.setScalar(scaleFactor);
            }

            // Update Materials
            waterMesh.material.opacity = opacityLvl;
            terrainMesh.material.wireframe = isWireframe;
            waterMesh.material.wireframe = isWireframe;

            const wantsLowPoly = document.getElementById('lowpoly').checked;
            if (terrainMesh.material.flatShading !== wantsLowPoly) {
                terrainMesh.material.flatShading = wantsLowPoly;
                terrainMesh.material.needsUpdate = true;
            }
        }

        // --- 6. Event Listeners ---

        // General text label syncing
        document.querySelectorAll('input[type="range"]').forEach(input => {
            input.addEventListener('input', (e) => {
                const displayObj = document.getElementById(`val-${e.target.id}`);
                if (displayObj) displayObj.textContent = e.target.value;
            });
        });

        // Generate binds
        document.getElementById('generate-btn').addEventListener('click', generateWorld);

        // Dynamic view bindings
        document.querySelectorAll('.dynamic-slider').forEach(input => {
            input.addEventListener('input', () => {
                updateDynamicView();
                if (input.id === 'water') {
                    updateBiomeColors(); // Recalculate shores and land mass colors when tide changes
                }
            });
        });

        document.querySelectorAll('.dynamic-toggle').forEach(input => {
            input.addEventListener('change', updateDynamicView);
        });

        // Window resize binding
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- 7. Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            // Water Wave Animation
            if (waterMesh && document.getElementById('animatewaves').checked && globalSimplex) {
                const time = Date.now() * 0.0015;
                const pos = waterMesh.geometry.attributes.position;

                for (let i = 0; i < pos.count; i++) {
                    const ox = waterOriginalPositions.getX(i);
                    const oy = waterOriginalPositions.getY(i);
                    const oz = waterOriginalPositions.getZ(i);
                    const nx = waterNormals.getX(i);
                    const ny = waterNormals.getY(i);
                    const nz = waterNormals.getZ(i);

                    // Map noise to original 3D position
                    const noise = globalSimplex.noise3D(ox * 0.03 + time * 0.2, oy * 0.03, oz * 0.03 + time * 0.2);
                    const waveAmplitude = 1.5;
                    const displacement = noise * waveAmplitude;

                    pos.setXYZ(i, ox + nx * displacement, oy + ny * displacement, oz + nz * displacement);
                }
                pos.needsUpdate = true;
                waterMesh.geometry.computeVertexNormals(); // Fix lighting reflections on new waves
            }

            renderer.render(scene, camera);
        }

        // Boot
        window.onload = () => {
            generateWorld();
            animate();
        };

    </script>
</body>

</html>
