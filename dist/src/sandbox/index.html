<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unified Sandbox Placeholder</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #050505;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(30, 58, 138, 0.15) 0%, transparent 50%),
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
        }

        .container {
            text-align: center;
            padding: 40px;
            background: rgba(15, 15, 20, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            max-width: 400px;
        }

        .icon {
            font-size: 48px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 20px rgba(96, 165, 250, 0.4));
        }

        h1 {
            font-size: 24px;
            font-weight: 900;
            margin: 0 0 12px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 14px;
            color: #94a3b8;
            line-height: 1.6;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🚧</div>
        <h1>Sandbox Coming Soon</h1>
        <p>This is where we will write the code to bring the Modular Man, Spell Effects, and Fog Machine into a single, fully-integrated Three.js scene.</p>
    </div>
</body>
</html>
